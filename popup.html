<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <div class="header">
      <h2>Corretor Inteligente</h2>
      <span class="badge">PT-BR</span>
    </div>
    
    <div class="stats">
      <p>Palavras no Dicionário: <strong id="word-count">Carregando...</strong></p>
    </div>

    <hr>

    <div class="control-group">
      <label class="switch-label">Status do Corretor</label>
      <button id="toggle-btn" class="btn btn-enabled">Ativado</button>
    </div>
    
    <div class="footer">
      <p>Clique em qualquer palavra errada para corrigir.</p>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
